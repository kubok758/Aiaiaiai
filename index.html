<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Злая нейросеть</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #08080c;
      color: white;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app {
      width: 100vw;
      height: 100dvh;
      display: flex;
      overflow: hidden;
      background: radial-gradient(circle at top, #330000, #050506 65%);
    }

    .sidebar {
      width: 290px;
      height: 100%;
      background: rgba(12, 12, 16, 0.96);
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      padding: 12px;
      flex-shrink: 0;
      transition: transform 0.25s ease;
      z-index: 5;
    }

    .new-chat {
      padding: 13px;
      border-radius: 14px;
      background: #ff3333;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-item {
      padding: 12px;
      border-radius: 12px;
      background: #1e1e28;
      cursor: pointer;
      font-size: 14px;
      line-height: 1.3;
      word-break: break-word;
    }

    .chat-item.active {
      background: #333344;
    }

    .main {
      flex: 1;
      min-width: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    header {
      flex-shrink: 0;
      padding: 14px 16px;
      background: rgba(255, 0, 0, 0.13);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-btn, .api-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      background: #252530;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    .subtitle {
      opacity: 0.7;
      font-size: 13px;
      margin-top: 3px;
    }

    .title-wrap {
      flex: 1;
      min-width: 0;
    }

    #chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      max-width: 78%;
      padding: 13px 15px;
      border-radius: 18px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 16px;
    }

    .user {
      align-self: flex-end;
      background: #246bff;
      border-bottom-right-radius: 5px;
    }

    .bot {
      align-self: flex-start;
      background: #292933;
      border-bottom-left-radius: 5px;
    }

    .error {
      background: #6b1515;
    }

    .inputbar {
      flex-shrink: 0;
      display: flex;
      gap: 10px;
      padding: 14px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      background: rgba(0, 0, 0, 0.45);
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    input {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      border-radius: 15px;
      padding: 14px;
      font-size: 16px;
      background: #252530;
      color: white;
    }

    .send-btn {
      border: none;
      border-radius: 15px;
      padding: 0 20px;
      background: #ff3333;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.72);
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      width: min(520px, 100%);
      background: #181820;
      border-radius: 24px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .modal-box a {
      color: #6ea8ff;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    @media (max-width: 750px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .msg {
        max-width: 88%;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <button class="new-chat" onclick="createNewChat()">+ Новый чат</button>
      <div class="chat-list" id="chatList"></div>
    </aside>

    <main class="main">
      <header>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>

        <div class="title-wrap">
          <h1>😡 Злая нейросеть</h1>
          <div class="subtitle">Отвечает как живой человек: иногда несколькими сообщениями.</div>
        </div>

        <button class="api-btn" onclick="openApiModal()">API</button>
      </header>

      <section id="chat"></section>

      <div class="inputbar">
        <input id="messageInput" placeholder="Напиши что-нибудь..." />
        <button class="send-btn" id="sendButton">Отправить</button>
      </div>
    </main>
  </div>

  <div class="modal" id="apiModal">
    <div class="modal-box">
      <h2>Введи OpenRouter API ключ</h2>
      <p>
        Получить ключ можно тут:
        <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a>
      </p>

      <input id="apiInput" placeholder="sk-or-v1-..." type="password" />

      <div class="modal-actions">
        <button class="send-btn" onclick="saveApiKey()">Сохранить</button>
        <button class="menu-btn" onclick="closeApiModal()">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const MODEL = "openrouter/auto";
    const API_STORAGE_KEY = "openrouter_api_key";
    const CHATS_STORAGE_KEY = "evil_ai_chats";
    const ACTIVE_CHAT_KEY = "evil_ai_active_chat";

    const chat = document.getElementById("chat");
    const input = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const apiModal = document.getElementById("apiModal");
    const apiInput = document.getElementById("apiInput");
    const chatList = document.getElementById("chatList");
    const sidebar = document.getElementById("sidebar");

    let chats = loadChats();
    let activeChatId = localStorage.getItem(ACTIVE_CHAT_KEY);

    if (!activeChatId || !chats.find(c => c.id === activeChatId)) {
      activeChatId = createChatObject().id;
      chats.push(getChat(activeChatId));
      saveChats();
    }

    function createChatObject() {
      const chatObject = {
        id: Date.now().toString(),
        title: "Новый чат",
        messages: [
          {
            role: "assistant",
            content: "Ну что, пиши уже. Только API сначала введи, если ещё не вводил."
          }
        ]
      };

      window.tempChatObject = chatObject;
      return chatObject;
    }

    function getChat(id) {
      if (window.tempChatObject && window.tempChatObject.id === id) {
        const result = window.tempChatObject;
        window.tempChatObject = null;
        return result;
      }

      return chats.find(c => c.id === id);
    }

    function loadChats() {
      try {
        return JSON.parse(localStorage.getItem(CHATS_STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveChats() {
      localStorage.setItem(CHATS_STORAGE_KEY, JSON.stringify(chats));
      localStorage.setItem(ACTIVE_CHAT_KEY, activeChatId);
      renderChatList();
    }

    function activeChat() {
      return chats.find(c => c.id === activeChatId);
    }

    function createNewChat() {
      const newChat = createChatObject();
      chats.unshift(getChat(newChat.id));
      activeChatId = newChat.id;
      saveChats();
      renderMessages();
      closeSidebarMobile();
    }

    function switchChat(id) {
      activeChatId = id;
      saveChats();
      renderMessages();
      closeSidebarMobile();
    }

    function renderChatList() {
      chatList.innerHTML = "";

      chats.forEach(c => {
        const div = document.createElement("div");
        div.className = "chat-item" + (c.id === activeChatId ? " active" : "");
        div.textContent = c.title;
        div.onclick = () => switchChat(c.id);
        chatList.appendChild(div);
      });
    }

    function renderMessages() {
      chat.innerHTML = "";

      activeChat().messages.forEach(m => {
        addMessageToScreen(m.content, m.role === "user" ? "user" : "bot", false);
      });

      chat.scrollTop = chat.scrollHeight;
    }

    function getApiKey() {
      return localStorage.getItem(API_STORAGE_KEY) || "";
    }

    function openApiModal() {
      apiInput.value = getApiKey();
      apiModal.classList.add("active");
      setTimeout(() => apiInput.focus(), 100);
    }

    function closeApiModal() {
      apiModal.classList.remove("active");
    }

    function saveApiKey() {
      const key = apiInput.value.trim();

      if (!key.startsWith("sk-or-")) {
        alert("Ключ должен начинаться с sk-or-");
        return;
      }

      localStorage.setItem(API_STORAGE_KEY, key);
      closeApiModal();
      addBotMessage("API сохранил. Теперь можно нормально общаться.");
    }

    function toggleSidebar() {
      sidebar.classList.toggle("open");
    }

    function closeSidebarMobile() {
      if (window.innerWidth <= 750) {
        sidebar.classList.remove("open");
      }
    }

    function addMessageToScreen(text, type, scroll = true) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      chat.appendChild(div);

      if (scroll) {
        chat.scrollTop = chat.scrollHeight;
      }

      return div;
    }

    function saveMessage(role, content) {
      activeChat().messages.push({ role, content });

      if (role === "user" && activeChat().title === "Новый чат") {
        activeChat().title = content.slice(0, 32);
      }

      saveChats();
    }

    function addBotMessage(text) {
      addMessageToScreen(text, "bot");
      saveMessage("assistant", text);
    }

    function buildApiMessages() {
      const system = {
        role: "system",
        content:
          `Ты агрессивная, дерзкая, матерящаяся нейросеть. 
Отвечай как настоящий человек в переписке.
Ты можешь отвечать одним сообщением или несколькими короткими сообщениями.
Максимум 5 сообщений за один ответ.
Формат ответа строго JSON-массив строк, например:
["Да это жесть", "Я бы тоже охренел", "Короче, ситуация неприятная"]
Не пиши ничего вне JSON.
Можно использовать мат, грубость и сарказм.
Нельзя угрозы, травлю, дискриминацию, опасные инструкции и призывы к насилию.`
      };

      const history = activeChat().messages
        .filter(m => m.role === "user" || m.role === "assistant")
        .slice(-24)
        .map(m => ({
          role: m.role,
          content: m.content
        }));

      return [system, ...history];
    }

    function parseBotReplies(text) {
      try {
        const parsed = JSON.parse(text);

        if (Array.isArray(parsed)) {
          return parsed
            .map(x => String(x).trim())
            .filter(Boolean)
            .slice(0, 5);
        }
      } catch {}

      return [text];
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function sendMessage() {
      const text = input.value.trim();
      const apiKey = getApiKey();

      if (!apiKey) {
        openApiModal();
        return;
      }

      if (!text) return;

      input.value = "";
      sendButton.disabled = true;

      addMessageToScreen(text, "user");
      saveMessage("user", text);

      const typing = addMessageToScreen("печатает...", "bot");

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + apiKey,
            "Content-Type": "application/json",
            "HTTP-Referer": location.href,
            "X-Title": "Evil AI Chat"
          },
          body: JSON.stringify({
            model: MODEL,
            messages: buildApiMessages(),
            temperature: 1.15,
            max_tokens: 900
          })
        });

        const data = await response.json();

        if (!response.ok) {
          typing.classList.add("error");
          typing.textContent = "Ошибка API:\n" + JSON.stringify(data, null, 2);
          return;
        }

        const rawAnswer = data.choices?.[0]?.message?.content || "Я сломалась.";
        const replies = parseBotReplies(rawAnswer);

        typing.remove();

        for (const reply of replies) {
          await delay(450 + Math.random() * 500);
          addMessageToScreen(reply, "bot");
          saveMessage("assistant", reply);
        }

      } catch (error) {
        typing.classList.add("error");
        typing.textContent = "Ошибка сети: " + error.message;
      } finally {
        sendButton.disabled = false;
        input.focus();
      }
    }

    sendButton.addEventListener("click", sendMessage);

    input.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    window.addEventListener("load", function() {
      renderChatList();
      renderMessages();

      if (!getApiKey()) {
        openApiModal();
      }
    });
  </script>
</body>
</html>
