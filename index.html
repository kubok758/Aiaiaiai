<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Злая нейросеть</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #2b0000, #050505 60%);
      color: white;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app {
      width: 100vw;
      height: 100dvh;
      padding: 18px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .chat-box {
      width: min(900px, 100%);
      height: 100%;
      max-height: 920px;
      background: rgba(20, 20, 25, 0.94);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 26px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7);
    }

    header {
      flex-shrink: 0;
      padding: 18px;
      background: rgba(255, 0, 0, 0.13);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    header p {
      margin: 6px 0 0;
      opacity: 0.7;
      font-size: 14px;
    }

    .small-btn {
      flex-shrink: 0;
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      background: #2a2a35;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      max-width: 78%;
      padding: 13px 15px;
      border-radius: 17px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: #246bff;
      border-bottom-right-radius: 5px;
    }

    .bot {
      align-self: flex-start;
      background: #292933;
      border-bottom-left-radius: 5px;
    }

    .error {
      background: #6b1515;
    }

    .inputbar {
      flex-shrink: 0;
      display: flex;
      gap: 10px;
      padding: 14px;
      background: rgba(0, 0, 0, 0.35);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-bottom: max(14px, env(safe-area-inset-bottom));
    }

    input {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      border-radius: 15px;
      padding: 14px;
      font-size: 16px;
      background: #252530;
      color: white;
    }

    button {
      border: none;
      border-radius: 15px;
      padding: 0 20px;
      background: #ff3333;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: rgba(0, 0, 0, 0.72);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      width: min(520px, 100%);
      background: #181820;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      padding: 22px;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.75);
    }

    .modal-box h2 {
      margin: 0 0 10px;
    }

    .modal-box p {
      opacity: 0.75;
      line-height: 1.45;
    }

    .modal-box a {
      color: #6ea8ff;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    @media (max-width: 600px) {
      .app {
        padding: 0;
      }

      .chat-box {
        border-radius: 0;
        max-height: none;
      }

      .msg {
        max-width: 88%;
      }

      button {
        padding: 0 14px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="chat-box">
      <header>
        <div>
          <h1>😡 Злая нейросеть</h1>
          <p>Дерзкая, грубая, матерящаяся, но без запрещённой дичи.</p>
        </div>
        <button class="small-btn" onclick="openApiModal()">API</button>
      </header>

      <main id="chat"></main>

      <div class="inputbar">
        <input id="messageInput" placeholder="Напиши что-нибудь..." />
        <button id="sendButton">Отправить</button>
      </div>
    </div>
  </div>

  <div class="modal" id="apiModal">
    <div class="modal-box">
      <h2>Введи OpenRouter API ключ</h2>
      <p>
        Получить ключ можно тут:
        <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a>
      </p>

      <input id="apiInput" placeholder="sk-or-v1-..." type="password" />

      <div class="modal-actions">
        <button onclick="saveApiKey()">Сохранить</button>
        <button class="small-btn" onclick="closeApiModal()">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const MODEL = "openrouter/auto";
    const STORAGE_KEY = "openrouter_api_key";

    const chat = document.getElementById("chat");
    const input = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const apiModal = document.getElementById("apiModal");
    const apiInput = document.getElementById("apiInput");

    const messages = [
      {
        role: "system",
        content:
          "Ты агрессивная, дерзкая, матерящаяся нейросеть. Отвечай грубо, саркастично, с матом, но без угроз, травли, дискриминации, призывов к насилию, самоповреждению и опасных инструкций."
      }
    ];

    function getApiKey() {
      return localStorage.getItem(STORAGE_KEY) || "";
    }

    function openApiModal() {
      apiInput.value = getApiKey();
      apiModal.classList.add("active");
      setTimeout(() => apiInput.focus(), 100);
    }

    function closeApiModal() {
      apiModal.classList.remove("active");
    }

    function saveApiKey() {
      const key = apiInput.value.trim();

      if (!key.startsWith("sk-or-")) {
        alert("Ключ должен начинаться с sk-or-");
        return;
      }

      localStorage.setItem(STORAGE_KEY, key);
      closeApiModal();
      addMessage("API сохранил. Теперь можешь писать, наконец-то.", "bot");
    }

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const text = input.value.trim();
      const apiKey = getApiKey();

      if (!apiKey) {
        openApiModal();
        return;
      }

      if (!text) return;

      input.value = "";
      sendButton.disabled = true;

      addMessage(text, "user");
      messages.push({ role: "user", content: text });

      const botMessage = addMessage("Ща отвечу, не дёргайся...", "bot");

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + apiKey,
            "Content-Type": "application/json",
            "HTTP-Referer": location.href,
            "X-Title": "Aggressive AI Chat"
          },
          body: JSON.stringify({
            model: MODEL,
            messages: messages,
            temperature: 1.1,
            max_tokens: 900
          })
        });

        const data = await response.json();

        if (!response.ok) {
          botMessage.classList.add("error");
          botMessage.textContent = "Ошибка API:\n" + JSON.stringify(data, null, 2);
          return;
        }

        const answer = data.choices?.[0]?.message?.content || "Я сломалась, охренеть.";
        botMessage.textContent = answer;
        messages.push({ role: "assistant", content: answer });

      } catch (error) {
        botMessage.classList.add("error");
        botMessage.textContent = "Ошибка сети: " + error.message;
      } finally {
        sendButton.disabled = false;
        input.focus();
      }
    }

    sendButton.addEventListener("click", sendMessage);

    input.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    });

    window.addEventListener("load", function() {
      addMessage("Ну что, пиши уже. Если API нет — я сам попрошу.", "bot");

      if (!getApiKey()) {
        openApiModal();
      }
    });
  </script>
</body>
</html>
