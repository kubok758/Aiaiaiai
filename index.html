<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI Chat</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #08080c;
      color: white;
    }

    body { position: fixed; inset: 0; }

    .app {
      width: 100vw;
      height: 100dvh;
      display: flex;
      overflow: hidden;
      background: radial-gradient(circle at top, #330000, #050506 65%);
    }

    .sidebar {
      width: 300px;
      height: 100%;
      background: rgba(12,12,16,.97);
      border-right: 1px solid rgba(255,255,255,.08);
      display: flex;
      flex-direction: column;
      padding: 12px;
      flex-shrink: 0;
      transition: transform .25s ease;
      z-index: 30;
    }

    .sidebar.closed {
      transform: translateX(-100%);
      position: fixed;
      left: 0;
      top: 0;
    }

    .new-chat {
      padding: 13px;
      border-radius: 14px;
      background: #ff3333;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .mode-select {
      width: 100%;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 14px;
      background: #252530;
      color: white;
      border: none;
      outline: none;
      font-weight: bold;
    }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .chat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-radius: 12px;
      background: #1e1e28;
      cursor: pointer;
      font-size: 14px;
      line-height: 1.3;
    }

    .chat-item.active { background: #333344; }

    .chat-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .delete-chat {
      background: #491818;
      color: white;
      border: none;
      border-radius: 9px;
      padding: 7px 9px;
      cursor: pointer;
    }

    .main {
      flex: 1;
      min-width: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    header {
      flex-shrink: 0;
      padding: 14px 16px;
      background: rgba(255,0,0,.13);
      border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .menu-btn, .api-btn {
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      background: #252530;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    h1 { margin: 0; font-size: 22px; }

    .subtitle {
      opacity: .7;
      font-size: 13px;
      margin-top: 3px;
    }

    .title-wrap {
      flex: 1;
      min-width: 0;
    }

    #chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      max-width: 78%;
      padding: 13px 15px;
      border-radius: 18px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 16px;
    }

    .user {
      align-self: flex-end;
      background: #246bff;
      border-bottom-right-radius: 5px;
    }

    .bot {
      align-self: flex-start;
      background: #292933;
      border-bottom-left-radius: 5px;
    }

    .typing {
      opacity: .7;
      font-style: italic;
    }

    .error { background: #6b1515; }

    .inputbar {
      flex-shrink: 0;
      display: flex;
      gap: 10px;
      padding: 14px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      background: rgba(0,0,0,.45);
      border-top: 1px solid rgba(255,255,255,.08);
    }

    input {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      border-radius: 15px;
      padding: 14px;
      font-size: 16px;
      background: #252530;
      color: white;
    }

    .send-btn {
      border: none;
      border-radius: 15px;
      padding: 0 20px;
      background: #ff3333;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled { opacity: .5; cursor: not-allowed; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,.72);
      padding: 20px;
    }

    .modal.active { display: flex; }

    .modal-box {
      width: min(520px, 100%);
      background: #181820;
      border-radius: 24px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,.14);
    }

    .modal-box a { color: #6ea8ff; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    @media (max-width: 750px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-100%);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar.closed {
        transform: translateX(-100%);
      }

      .msg { max-width: 88%; }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <button class="new-chat" onclick="createNewChat()">+ Новый чат</button>

      <select class="mode-select" id="modeSelect" onchange="changeMode()">
        <option value="evil">😡 Злая нейросеть</option>
        <option value="roleplay">🎭 Ролевая игра</option>
      </select>

      <div class="chat-list" id="chatList"></div>
    </aside>

    <main class="main">
      <header>
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>

        <div class="title-wrap">
          <h1 id="appTitle">😡 Злая нейросеть</h1>
          <div class="subtitle" id="appSubtitle">Пишет как человек: отдельными сообщениями с задержкой.</div>
        </div>

        <button class="api-btn" onclick="openApiModal()">API</button>
      </header>

      <section id="chat"></section>

      <div class="inputbar">
        <input id="messageInput" placeholder="Напиши что-нибудь..." />
        <button class="send-btn" id="sendButton">Отправить</button>
      </div>
    </main>
  </div>

  <div class="modal" id="apiModal">
    <div class="modal-box">
      <h2>Введи OpenRouter API ключ</h2>
      <p>Получить ключ можно тут: <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai/keys</a></p>
      <input id="apiInput" placeholder="sk-or-v1-..." type="password" />
      <div class="modal-actions">
        <button class="send-btn" onclick="saveApiKey()">Сохранить</button>
        <button class="menu-btn" onclick="closeApiModal()">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    const MODEL = "openrouter/auto";
    const API_STORAGE_KEY = "openrouter_api_key";
    const CHATS_STORAGE_KEY = "evil_ai_chats_v2";
    const ACTIVE_CHAT_KEY = "evil_ai_active_chat_v2";

    const chat = document.getElementById("chat");
    const input = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");
    const apiModal = document.getElementById("apiModal");
    const apiInput = document.getElementById("apiInput");
    const chatList = document.getElementById("chatList");
    const sidebar = document.getElementById("sidebar");
    const modeSelect = document.getElementById("modeSelect");
    const appTitle = document.getElementById("appTitle");
    const appSubtitle = document.getElementById("appSubtitle");

    let chats = loadChats();
    let activeChatId = localStorage.getItem(ACTIVE_CHAT_KEY);

    if (!activeChatId || !chats.find(c => c.id === activeChatId)) {
      const c = makeChat("evil");
      chats.unshift(c);
      activeChatId = c.id;
      saveChats();
    }

    function makeChat(mode) {
      return {
        id: Date.now().toString() + Math.random().toString(16).slice(2),
        title: "Новый чат",
        mode,
        messages: [
          {
            role: "assistant",
            content: mode === "roleplay"
              ? "Опиши персонажа, мир и ситуацию — начнём ролевую."
              : "Ну что, пиши уже. Только API сначала введи, если ещё не вводил."
          }
        ]
      };
    }

    function loadChats() {
      try {
        return JSON.parse(localStorage.getItem(CHATS_STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveChats() {
      localStorage.setItem(CHATS_STORAGE_KEY, JSON.stringify(chats));
      localStorage.setItem(ACTIVE_CHAT_KEY, activeChatId);
      renderChatList();
      updateHeader();
    }

    function activeChat() {
      return chats.find(c => c.id === activeChatId);
    }

    function createNewChat() {
      const c = makeChat(modeSelect.value || "evil");
      chats.unshift(c);
      activeChatId = c.id;
      saveChats();
      renderMessages();
      closeSidebarOnMobile();
    }

    function deleteChat(id, event) {
      event.stopPropagation();

      const c = chats.find(chat => chat.id === id);
      if (!c) return;

      const ok = confirm(`Удалить чат "${c.title}"?`);
      if (!ok) return;

      chats = chats.filter(chat => chat.id !== id);

      if (chats.length === 0) {
        const newChat = makeChat("evil");
        chats.unshift(newChat);
        activeChatId = newChat.id;
      } else if (activeChatId === id) {
        activeChatId = chats[0].id;
      }

      saveChats();
      renderMessages();
    }

    function switchChat(id) {
      activeChatId = id;
      saveChats();
      renderMessages();
      closeSidebarOnMobile();
    }

    function renderChatList() {
      chatList.innerHTML = "";

      chats.forEach(c => {
        const div = document.createElement("div");
        div.className = "chat-item" + (c.id === activeChatId ? " active" : "");
        div.onclick = () => switchChat(c.id);

        const title = document.createElement("div");
        title.className = "chat-title";
        title.textContent = c.title;

        const del = document.createElement("button");
        del.className = "delete-chat";
        del.textContent = "✕";
        del.onclick = (event) => deleteChat(c.id, event);

        div.appendChild(title);
        div.appendChild(del);
        chatList.appendChild(div);
      });
    }

    function renderMessages() {
      chat.innerHTML = "";

      activeChat().messages.forEach(m => {
        addMessageToScreen(m.content, m.role === "user" ? "user" : "bot", false);
      });

      modeSelect.value = activeChat().mode || "evil";
      updateHeader();

      chat.scrollTop = chat.scrollHeight;
    }

    function changeMode() {
      activeChat().mode = modeSelect.value;
      saveChats();

      if (modeSelect.value === "roleplay") {
        addBotMessage("Режим ролевой включён. Опиши сеттинг, персонажа и что происходит.");
      } else {
        addBotMessage("Режим злой нейросети включён. Ну всё, держись.");
      }

      updateHeader();
    }

    function updateHeader() {
      const mode = activeChat()?.mode || "evil";
      modeSelect.value = mode;

      if (mode === "roleplay") {
        appTitle.textContent = "🎭 Ролевая нейросеть";
        appSubtitle.textContent = "Играет роль, ведёт сцену и отвечает как персонаж.";
      } else {
        appTitle.textContent = "😡 Злая нейросеть";
        appSubtitle.textContent = "Пишет как человек: отдельными сообщениями с задержкой.";
      }
    }

    function getApiKey() {
      return localStorage.getItem(API_STORAGE_KEY) || "";
    }

    function openApiModal() {
      apiInput.value = getApiKey();
      apiModal.classList.add("active");
      setTimeout(() => apiInput.focus(), 100);
    }

    function closeApiModal() {
      apiModal.classList.remove("active");
    }

    function saveApiKey() {
      const key = apiInput.value.trim();

      if (!key.startsWith("sk-or-")) {
        alert("Ключ должен начинаться с sk-or-");
        return;
      }

      localStorage.setItem(API_STORAGE_KEY, key);
      closeApiModal();
      addBotMessage("API сохранил. Теперь можно нормально общаться.");
    }

    function toggleSidebar() {
      if (window.innerWidth <= 750) {
        sidebar.classList.toggle("open");
      } else {
        sidebar.classList.toggle("closed");
      }
    }

    function closeSidebarOnMobile() {
      if (window.innerWidth <= 750) {
        sidebar.classList.remove("open");
      }
    }

    function addMessageToScreen(text, type, scroll = true) {
      const div = document.createElement("div");
      div.className = "msg " + type;
      div.textContent = text;
      chat.appendChild(div);
      if (scroll) chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function saveMessage(role, content) {
      activeChat().messages.push({ role, content });

      if (role === "user" && activeChat().title === "Новый чат") {
        activeChat().title = content.slice(0, 32);
      }

      saveChats();
    }

    function addBotMessage(text) {
      addMessageToScreen(text, "bot");
      saveMessage("assistant", text);
    }

    function buildSystemPrompt() {
      if ((activeChat().mode || "evil") === "roleplay") {
        return `Ты нейросеть для ролевой игры.
Веди сцену как живой собеседник.
Отвечай JSON-массивом строк.
Без markdown, без \`\`\`, без пояснений.
От 1 до 5 сообщений.
Каждая строка — отдельное сообщение.
Ты можешь играть персонажей, описывать действия, атмосферу и диалоги.
Не ломай роль без необходимости.
Нельзя сексуальный контент с несовершеннолетними, угрозы, травля, опасные инструкции и призывы к насилию.`;
      }

      return `Ты агрессивная, дерзкая, матерящаяся нейросеть.
Отвечай как настоящий человек в переписке.
Ответ должен быть JSON-массивом строк.
Без markdown. Без \`\`\`json. Без пояснений.
От 1 до 5 сообщений.
Каждая строка — отдельное короткое сообщение.
Можно использовать мат, грубость и сарказм.
Нельзя угрозы, травлю, дискриминацию, опасные инструкции и призывы к насилию.`;
    }

    function buildApiMessages() {
      const system = {
        role: "system",
        content: buildSystemPrompt()
      };

      const history = activeChat().messages
        .filter(m => m.role === "user" || m.role === "assistant")
        .slice(-24)
        .map(m => ({ role: m.role, content: m.content }));

      return [system, ...history];
    }

    function parseBotReplies(text) {
      let clean = text.trim();

      clean = clean
        .replace(/^```json/i, "")
        .replace(/^```/i, "")
        .replace(/```$/i, "")
        .trim();

      const firstBracket = clean.indexOf("[");
      const lastBracket = clean.lastIndexOf("]");

      if (firstBracket !== -1 && lastBracket !== -1) {
        clean = clean.slice(firstBracket, lastBracket + 1);
      }

      try {
        const parsed = JSON.parse(clean);

        if (Array.isArray(parsed)) {
          return parsed
            .map(x => String(x).trim())
            .filter(Boolean)
            .slice(0, 5);
        }
      } catch {}

      return [text.replace(/```json|```/g, "").trim()];
    }

    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function sendMessage() {
      const text = input.value.trim();
      const apiKey = getApiKey();

      if (!apiKey) {
        openApiModal();
        return;
      }

      if (!text) return;

      input.value = "";
      sendButton.disabled = true;

      addMessageToScreen(text, "user");
      saveMessage("user", text);

      const typing = addMessageToScreen("печатает...", "bot typing");

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + apiKey,
            "Content-Type": "application/json",
            "HTTP-Referer": location.href,
            "X-Title": "AI Chat"
          },
          body: JSON.stringify({
            model: MODEL,
            messages: buildApiMessages(),
            temperature: 1.15,
            max_tokens: 900
          })
        });

        const data = await response.json();

        if (!response.ok) {
          typing.classList.remove("typing");
          typing.classList.add("error");
          typing.textContent = "Ошибка API:\n" + JSON.stringify(data, null, 2);
          return;
        }

        const rawAnswer = data.choices?.[0]?.message?.content || "Я сломалась.";
        const replies = parseBotReplies(rawAnswer);

        typing.remove();

        for (const reply of replies) {
          const typingBubble = addMessageToScreen("печатает...", "bot typing");
          await delay(2000 + Math.random() * 1000);
          typingBubble.remove();

          addMessageToScreen(reply, "bot");
          saveMessage("assistant", reply);
        }

      } catch (error) {
        typing.classList.remove("typing");
        typing.classList.add("error");
        typing.textContent = "Ошибка сети: " + error.message;
      } finally {
        sendButton.disabled = false;
        input.focus();
      }
    }

    sendButton.addEventListener("click", sendMessage);

    input.addEventListener("keydown", function(event) {
      if (event.key === "Enter") sendMessage();
    });

    window.addEventListener("load", function() {
      renderChatList();
      renderMessages();
      if (!getApiKey()) openApiModal();
    });
  </script>
</body>
</html>
